<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🔮 Tarot Oracle</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: radial-gradient(ellipse at 50% 0%, #1a0533 0%, #0a0118 65%);
      min-height: 100vh; color: white;
      font-family: 'Noto Serif KR', serif;
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px 60px;
    }
    @keyframes twinkle { 0%,100%{opacity:.1;transform:scale(1)} 50%{opacity:.8;transform:scale(1.4)} }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes glow { 0%,100%{text-shadow:0 0 20px rgba(167,139,250,.4)} 50%{text-shadow:0 0 50px rgba(167,139,250,.9),0 0 80px rgba(124,58,237,.4)} }

    #stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .star { position:absolute; border-radius:50%; background:white; }

    .wrap { width:100%; max-width:580px; position:relative; z-index:1; }

    .header { text-align:center; margin-bottom:36px; z-index:1; position:relative; }
    .header-orb { font-size:52px; animation:float 4s ease-in-out infinite; margin-bottom:10px; }
    .header-title {
      font-family:'Cinzel',serif; font-size:clamp(22px,5vw,34px); font-weight:700;
      letter-spacing:.18em;
      background:linear-gradient(135deg,#f0e6ff,#a78bfa,#7c3aed);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:glow 3s ease-in-out infinite;
    }
    .header-sub { color:#8b6fc4; font-size:12px; letter-spacing:.22em; margin-top:6px; }

    .btn {
      background:linear-gradient(135deg,#7c3aed,#a855f7); border:none; border-radius:8px;
      color:white; cursor:pointer; padding:12px 28px;
      font-family:'Cinzel',serif; font-size:13px; letter-spacing:.1em;
      box-shadow:0 0 20px rgba(124,58,237,.4); transition:all .3s;
    }
    .btn:hover { transform:translateY(-2px); box-shadow:0 0 35px rgba(124,58,237,.7); }
    .btn:disabled { opacity:.35; cursor:default; transform:none !important; }
    .btn-ghost { background:rgba(167,139,250,.08); box-shadow:none; border:1px solid rgba(167,139,250,.2); }
    .btn-ghost:hover { background:rgba(167,139,250,.15); box-shadow:none !important; }

    .box {
      background:rgba(167,139,250,.05); border:1px solid rgba(167,139,250,.18);
      border-radius:16px; padding:32px 28px; margin-bottom:28px;
    }
    .box p { color:#c4b5fd; line-height:2; font-size:15px; }

    textarea {
      width:100%; background:rgba(167,139,250,.05);
      border:1px solid rgba(167,139,250,.3); border-radius:12px;
      padding:16px; color:#e9d5ff; font-size:14px;
      font-family:'Noto Serif KR',serif; resize:none; line-height:1.8;
    }
    textarea:focus { outline:none; border-color:#a78bfa; }

    .spread-card {
      background:rgba(167,139,250,.05); border:1px solid rgba(167,139,250,.2);
      border-radius:12px; padding:18px 20px; cursor:pointer; transition:all .3s;
      display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;
    }
    .spread-card:hover { background:rgba(167,139,250,.1); border-color:rgba(167,139,250,.6); transform:translateY(-2px); }
    .spread-name { color:#e9d5ff; font-family:'Cinzel',serif; font-size:14px; }
    .spread-desc { color:#8b6fc4; font-size:12px; margin-top:3px; }
    .spread-badge { background:rgba(124,58,237,.3); border-radius:20px; padding:4px 14px; color:#c4b5fd; font-size:12px; }

    .cards-row { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; margin-bottom:28px; }
    .card-col { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .card-pos { font-size:10px; color:#5a4070; letter-spacing:.1em; font-family:'Cinzel',serif; text-transform:uppercase; }

    .card-back {
      width:80px; height:130px; border-radius:10px;
      background:linear-gradient(135deg,#2d0f5e,#1a0a3d,#0f0520);
      border:2px solid #a78bfa; cursor:pointer;
      display:flex; align-items:center; justify-content:center; font-size:26px;
      box-shadow:0 0 20px rgba(167,139,250,.45); transition:all .3s;
      position:relative; overflow:hidden;
    }
    .card-back::before {
      content:''; position:absolute; inset:0;
      background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(167,139,250,.04) 10px,rgba(167,139,250,.04) 20px);
    }
    .card-back.active:hover { transform:translateY(-6px) scale(1.05); box-shadow:0 0 35px rgba(167,139,250,.7); }
    .card-back.done { border-color:#7c3aed; opacity:.45; cursor:default; }

    .card-front {
      width:80px; height:130px; border-radius:10px;
      background:linear-gradient(135deg,#1a0533,#2d1054 60%,#1a0a3d);
      border:2px solid #a78bfa;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:6px; padding:8px;
      box-shadow:0 0 25px rgba(167,139,250,.35);
      transition:opacity .5s, transform .5s;
    }
    .card-front.reversed { transform:rotate(180deg); }
    .card-emoji { font-size:28px; }
    .card-name { font-size:8px; color:#e9d5ff; text-align:center; font-family:'Cinzel',serif; line-height:1.3; }
    .card-rev-label { font-size:10px; color:#f87171; }
    .card-pos-revealed { font-size:11px; color:#c4b5fd; letter-spacing:.1em; text-transform:uppercase; font-family:'Cinzel',serif; }

    .reading-box {
      background:rgba(167,139,250,.06); border:1px solid rgba(167,139,250,.2);
      border-radius:16px; padding:24px; margin-bottom:20px;
      animation:fadeUp .7s ease;
    }
    .reading-title { color:#c4b5fd; font-size:11px; letter-spacing:.2em; margin-bottom:14px; font-family:'Cinzel',serif; text-align:center; }
    .reading-text { color:#e9d5ff; line-height:2; font-size:14px; white-space:pre-wrap; }

    .row-center { display:flex; gap:12px; justify-content:center; margin-top:16px; }
    .section { animation:fadeUp .5s ease; }
    h2 { font-family:'Cinzel',serif; color:#e9d5ff; text-align:center; margin-bottom:20px; font-size:17px; font-weight:600; }
    .sub { text-align:center; color:#8b6fc4; font-size:12px; margin-bottom:24px; }
    .question-preview { text-align:center; color:#7c5fa8; font-size:12px; margin-bottom:20px; }
    .footer { margin-top:50px; color:#2d1a4a; font-size:11px; text-align:center; z-index:1; }

    ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:#0a0118} ::-webkit-scrollbar-thumb{background:#7c3aed;border-radius:4px}
  </style>
</head>
<body>

<div id="stars"></div>

<div class="header">
  <div class="header-orb">🔮</div>
  <h1 class="header-title">TAROT ORACLE</h1>
  <p class="header-sub">별빛이 당신의 길을 밝힙니다</p>
</div>

<div class="wrap" id="app"></div>
<div class="footer">✦ 타로는 오락과 자기성찰을 위한 도구입니다 ✦</div>

<script>
const CARDS = [
  { name:"바보", emoji:"🃏", upright:"새로운 시작이 눈앞에 펼쳐집니다. 두려움 없이 첫 발을 내딛을 때입니다. 순수한 마음으로 가능성을 열어보세요.", reversed:"무모한 선택을 경계하세요. 충분한 준비 없이 앞으로 나아가면 후회할 수 있습니다. 잠시 멈추고 돌아보세요." },
  { name:"마법사", emoji:"🪄", upright:"당신에게는 원하는 것을 이룰 모든 능력이 갖추어져 있습니다. 집중력과 의지로 현실을 바꿀 수 있는 때입니다.", reversed:"재능이 있지만 방향을 잃었습니다. 에너지를 분산하지 말고 한 곳에 집중하세요." },
  { name:"여사제", emoji:"🌙", upright:"직관을 믿으세요. 겉으로 드러나지 않는 진실이 있습니다. 조용히 내면의 목소리에 귀를 기울일 때입니다.", reversed:"감추어진 정보나 비밀이 있을 수 있습니다. 표면적인 것만 보지 말고 더 깊이 살펴보세요." },
  { name:"여황제", emoji:"🌸", upright:"풍요와 사랑이 넘치는 시기입니다. 창조적인 에너지가 활발하며, 관계와 일 모두에서 결실을 맺을 수 있습니다.", reversed:"과도한 의존이나 집착을 조심하세요. 스스로를 먼저 돌보는 것이 중요합니다." },
  { name:"황제", emoji:"👑", upright:"안정과 질서의 시기입니다. 체계적인 계획과 리더십이 빛을 발합니다. 목표를 향해 단단히 나아가세요.", reversed:"지나친 통제나 고집이 주변을 힘들게 할 수 있습니다. 유연함을 발휘할 때입니다." },
  { name:"교황", emoji:"⛪", upright:"전통과 지혜로운 조언이 도움이 됩니다. 믿을 수 있는 스승이나 멘토를 찾거나, 확립된 방법을 따르세요.", reversed:"기존의 규칙이 당신을 억누르고 있습니다. 스스로의 길을 개척할 용기가 필요합니다." },
  { name:"연인", emoji:"💑", upright:"중요한 선택의 기로에 서 있습니다. 마음이 이끄는 방향을 따르세요. 관계에서 깊은 연결과 조화를 느낄 수 있습니다.", reversed:"가치관의 충돌이나 선택의 어려움이 있습니다. 충동적인 결정보다 신중한 판단이 필요합니다." },
  { name:"전차", emoji:"⚔️", upright:"강한 의지와 집중력으로 장애물을 극복할 수 있습니다. 승리가 가까이 있습니다. 포기하지 마세요.", reversed:"방향을 잃거나 에너지가 충돌하고 있습니다. 잠시 멈추고 목표를 재정비할 필요가 있습니다." },
  { name:"힘", emoji:"🦁", upright:"부드러운 용기와 인내가 빛을 발합니다. 강인함은 폭력이 아닌 사랑과 자제력에서 나옵니다. 당신은 충분히 강합니다.", reversed:"자신감이 흔들리거나 내면의 두려움이 발목을 잡고 있습니다. 자기 자신을 믿어보세요." },
  { name:"은둔자", emoji:"🕯️", upright:"혼자만의 시간이 필요합니다. 내면을 들여다보고 진정한 길을 찾을 때입니다. 고독은 지혜를 줍니다.", reversed:"고립이 깊어지고 있습니다. 주변의 손길을 거부하지 말고, 관계 속에서 답을 찾아보세요." },
  { name:"운명의 수레바퀴", emoji:"🎡", upright:"변화와 전환의 시기가 왔습니다. 흐름을 타면 행운이 따릅니다. 변화를 두려워하지 마세요.", reversed:"운이 잠시 막혀있는 시기입니다. 억지로 밀어붙이기보다 때를 기다리는 인내가 필요합니다." },
  { name:"정의", emoji:"⚖️", upright:"공정하고 올바른 결과가 찾아옵니다. 진실을 말하고 균형을 유지하세요. 과거의 행동이 결과로 돌아옵니다.", reversed:"불공정한 상황에 처해있을 수 있습니다. 책임을 회피하지 말고 솔직하게 대면하세요." },
  { name:"매달린 남자", emoji:"🙃", upright:"다른 관점으로 바라볼 때입니다. 잠시 멈추고 내려놓을 때 새로운 통찰이 찾아옵니다.", reversed:"희생만 하고 아무것도 얻지 못하는 상황입니다. 더 이상 미루지 말고 결단을 내리세요." },
  { name:"죽음", emoji:"🌑", upright:"끝이 아닌 변환의 시간입니다. 오래된 것을 내려놓아야 새로운 것이 찾아옵니다. 두려워하지 마세요.", reversed:"변화에 저항하고 있습니다. 놓아야 할 것을 붙잡고 있어 앞으로 나아가기 어렵습니다." },
  { name:"절제", emoji:"🌊", upright:"균형과 조화가 핵심입니다. 서두르지 않고 꾸준히 나아가면 아름다운 결과가 찾아옵니다.", reversed:"불균형과 과잉이 문제입니다. 극단적인 선택보다 중용의 길을 찾아보세요." },
  { name:"악마", emoji:"🔗", upright:"무언가에 묶여있다고 느끼지만, 사실 그 사슬은 스스로 풀 수 있습니다. 집착과 욕망을 직면하세요.", reversed:"속박에서 벗어나는 과정에 있습니다. 용기 있는 선택이 자유를 가져다 줄 것입니다." },
  { name:"탑", emoji:"⚡", upright:"갑작스러운 변화가 찾아옵니다. 무너지는 것처럼 느껴지지만, 이것은 더 나은 것을 위한 정리입니다.", reversed:"위기를 피하려 하지만 변화는 이미 시작되었습니다. 저항보다 받아들임이 도움이 됩니다." },
  { name:"별", emoji:"⭐", upright:"희망과 치유의 빛이 비춥니다. 어두운 시간이 지나가고 있습니다. 미래를 믿고 자신을 사랑하세요.", reversed:"희망을 잃지 마세요. 지금은 어둡게 느껴지지만 별빛은 항상 그 자리에 있습니다." },
  { name:"달", emoji:"🌕", upright:"불안과 두려움이 마음을 흐립니다. 모든 것이 보이는 그대로가 아닐 수 있습니다. 직관을 믿으세요.", reversed:"혼란이 걷히고 진실이 드러나기 시작합니다. 오해가 풀리고 명확함이 찾아올 것입니다." },
  { name:"태양", emoji:"☀️", upright:"기쁨과 성공, 활력이 넘치는 시기입니다. 자신감을 가지고 나아가세요. 모든 것이 밝게 빛납니다.", reversed:"긍정적인 에너지가 잠시 가려져 있습니다. 기쁨을 되찾기 위한 작은 행동을 시작해보세요." },
  { name:"심판", emoji:"🎺", upright:"과거를 돌아보고 새롭게 각성할 때입니다. 진정한 부름에 응답하고 변화를 받아들이세요.", reversed:"자기 비판이 너무 심합니다. 과거에 집착하지 말고 앞을 바라볼 용기를 내세요." },
  { name:"세계", emoji:"🌍", upright:"완성과 성취의 시간입니다. 한 사이클이 마무리되고 있습니다. 지금까지의 여정을 축하하세요.", reversed:"마무리가 아직 덜 되었습니다. 마지막 한 걸음을 내딛으면 완성이 가까워집니다." },
];

const SPREADS = [
  { id:"one", name:"한 장 뽑기", count:1, desc:"오늘의 메시지", positions:["현재"] },
  { id:"three", name:"세 장 뽑기", count:3, desc:"과거 · 현재 · 미래", positions:["과거","현재","미래"] },
  { id:"five", name:"다섯 장 뽑기", count:5, desc:"심층 분석", positions:["현재 상황","도전","과거","미래","결과"] },
];

// State
let state = { step:"intro", question:"", spread:null, cards:[], revealed:0 };

// Stars
(function() {
  const s = document.getElementById('stars');
  for (let i=0; i<70; i++) {
    const d = document.createElement('div');
    d.className = 'star';
    const sz = (i%3)+1;
    d.style.cssText = `width:${sz}px;height:${sz}px;left:${(i*137.5)%100}%;top:${(i*97.3)%100}%;opacity:${((i%7)+1)/10};animation:twinkle ${(i%3)+2}s ease-in-out infinite;animation-delay:${(i%5)*.8}s`;
    s.appendChild(d);
  }
})();

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }
function draw(n) { return shuffle(CARDS).slice(0,n).map(c => ({...c, rev: Math.random()>.7})); }

function buildReading() {
  const { cards, spread } = state;
  if (!cards.length) return '';
  if (cards.length === 1) {
    const c = cards[0];
    return `✦ ${c.name} ✦\n\n${c.rev ? c.reversed : c.upright}\n\n오늘 하루, 이 카드의 에너지를 마음에 담아보세요.`;
  }
  const lines = cards.map((c,i) =>
    `【${spread.positions[i]}】 ${c.name}${c.rev?' (역방향)':''}\n${c.rev ? c.reversed : c.upright}`
  ).join('\n\n');
  const last = cards[cards.length-1];
  return `${lines}\n\n✦ 전체 메시지 ✦\n카드들이 전하는 흐름을 따라가 보세요. 특히 "${last.name}" 카드가 앞으로의 방향을 가리키고 있습니다. 지금 이 순간의 직관을 믿으세요.`;
}

function render() {
  const app = document.getElementById('app');
  const { step, question, spread, cards, revealed } = state;

  if (step === 'intro') {
    app.innerHTML = `
      <div class="section" style="text-align:center">
        <div class="box"><p>우주의 카드들이 당신의 질문을 기다립니다.<br>마음 깊은 곳의 물음을 꺼내어 보세요.</p></div>
        <button class="btn" onclick="goto('question')">✨ 리딩 시작하기</button>
      </div>`;
  }

  else if (step === 'question') {
    app.innerHTML = `
      <div class="section">
        <h2>질문을 입력하세요</h2>
        <textarea id="q" rows="4" placeholder="예: 이번 달 연애운은 어떤가요?&#10;새로운 직장으로 이직해야 할까요?">${question}</textarea>
        <div class="row-center">
          <button class="btn btn-ghost" onclick="goto('intro')">← 뒤로</button>
          <button class="btn" id="nextBtn" onclick="nextFromQ()">다음 →</button>
        </div>
      </div>`;
    document.getElementById('q').addEventListener('input', e => {
      state.question = e.target.value;
      document.getElementById('nextBtn').disabled = !e.target.value.trim();
    });
    document.getElementById('nextBtn').disabled = !question.trim();
  }

  else if (step === 'spread') {
    app.innerHTML = `
      <div class="section">
        <h2>스프레드를 선택하세요</h2>
        <p class="question-preview">"${question}"</p>
        ${SPREADS.map(s => `
          <div class="spread-card" onclick="selectSpread('${s.id}')">
            <div>
              <div class="spread-name">${s.name}</div>
              <div class="spread-desc">${s.desc}</div>
            </div>
            <div class="spread-badge">${s.count}장</div>
          </div>`).join('')}
      </div>`;
  }

  else if (step === 'draw') {
    const allRevealed = revealed >= cards.length;
    app.innerHTML = `
      <div class="section">
        <h2>카드를 뽑아보세요</h2>
        <p class="sub">${allRevealed ? '✦ 모든 카드가 공개되었습니다 ✦' : `카드를 클릭하여 공개하세요 (${revealed}/${cards.length})`}</p>
        <div class="cards-row">
          ${cards.map((c,i) => i < revealed ? `
            <div class="card-col">
              <div class="card-pos-revealed">${spread.positions[i]}</div>
              <div class="card-front ${c.rev?'reversed':''}">
                <span class="card-emoji">${c.emoji}</span>
                <div class="card-name">${c.name}</div>
              </div>
              ${c.rev ? '<div class="card-rev-label">역방향</div>' : ''}
            </div>` : `
            <div class="card-col">
              <div class="card-pos">${spread.positions[i]}</div>
              <div class="card-back ${i===revealed?'active':'done'}" onclick="${i===revealed?'revealCard()':''}">🔮</div>
            </div>`
          ).join('')}
        </div>
        ${allRevealed ? `
          <div class="reading-box">
            <div class="reading-title">✦ ORACLE'S MESSAGE ✦</div>
            <div class="reading-text">${buildReading()}</div>
          </div>
          <div style="text-align:center">
            <button class="btn" onclick="reset()">🔄 다시 뽑기</button>
          </div>` : ''}
      </div>`;
  }
}

function goto(s) { state.step = s; render(); }
function nextFromQ() { if (state.question.trim()) { state.step = 'spread'; render(); } }
function selectSpread(id) {
  state.spread = SPREADS.find(s => s.id === id);
  state.cards = draw(state.spread.count);
  state.revealed = 0;
  state.step = 'draw';
  render();
}
function revealCard() {
  state.revealed++;
  render();
  if (state.revealed >= state.cards.length) {
    setTimeout(() => document.querySelector('.reading-box')?.scrollIntoView({behavior:'smooth'}), 100);
  }
}
function reset() {
  state = { step:'intro', question:'', spread:null, cards:[], revealed:0 };
  render();
}

render();
</script>
</body>
</html>
